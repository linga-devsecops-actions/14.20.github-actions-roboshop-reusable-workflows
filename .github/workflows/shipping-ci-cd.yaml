---
name: roboshop-shipping-ci-cd

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string
      app_type:
        required: true
        type: string

    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  ci:
    runs-on: self-hosted

    outputs:
      appVersion: ${{ steps.app-version.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Java & Maven
        run: |
          sudo dnf install -y java-17-openjdk-devel maven unzip

      - name: Verify Java Installation
        run: java -version

      - name: Verify Maven Installation
        run: mvn -version

      - name: Generate Application Version
        id: app-version
        run: |
          echo "version=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Build Shipping Application
        run: |
          mvn clean package
          mv target/shipping-1.0.jar shipping.jar

      - name: Docker Build
        run: |
          docker build \
            -t 805778285734.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.environment }}/${{ inputs.component }}:${{ steps.app-version.outputs.version }} .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin \
          805778285734.dkr.ecr.us-east-1.amazonaws.com

      - name: Push Docker Image
        run: |
          docker push \
          805778285734.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.environment }}/${{ inputs.component }}:${{ steps.app-version.outputs.version }}

  cd:
    runs-on: self-hosted
    needs: ci

    env:
      appVersion: ${{ needs.ci.outputs.appVersion }}

    steps:
      - name: Checkout Deploy Repository
        uses: actions/checkout@v5
        with:
          repository: linga-devsecops-actions/14.34.github-actions-roboshop-shipping-cd

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authenticate to EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name roboshop-dev
          kubectl get nodes

      - name: Create Namespace
        run: |
          kubectl create namespace roboshop \
          --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Shipping
        run: |
          helm upgrade --install ${{ inputs.component }} -n roboshop\
            -f helm/values-dev.yaml \
            --set deployment.imageVersion="$appVersion" helm

      - name: Verify Deployment
        run: |
          kubectl get pods -n roboshop

